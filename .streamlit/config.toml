# SCM Prospector — theme configuration
# Paleta: charcoal + emerald. Vibe Linear/Notion B2B SaaS.

[theme]
# Color principal — emerald accent (CTAs)
primaryColor = "#10B981"

# Background blanco
backgroundColor = "#FFFFFF"

# Sidebar — slate-50
secondaryBackgroundColor = "#F8FAFC"

# Texto principal — charcoal
textColor = "#0F172A"

# Font
font = "sans serif"

[server]
headless = true
